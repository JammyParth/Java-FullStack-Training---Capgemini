
spring:
  application:
    name: GATEWAY-SERVICE
  cloud:
    gateway:
      routes:
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**
            
        - id: demat-account-service
          uri: lb://DEMAT-ACCOUNT-SERVICE
          predicates:
            - Path=/demataccounts/**
            
        - id: loan-service
          uri: lb://LOAN-SERVICE
          predicates:
            - Path=/loans/** 
           
  

eureka:
  client:
    register-with-eureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    
server:
  port: 8989
  
